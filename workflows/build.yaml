name: Build AviumUI 16.2 with Latest KernelSU for OnePlus 8T (kebab)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 420
    permissions:
      contents: write  # 必须有这个权限才能创建Release
      actions: read

    steps:
      - name: 🧹 Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: 📦 Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git-core gnupg flex bison build-essential zip curl zlib1g-dev \
            libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev \
            libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc \
            unzip fontconfig python3 python3-pip python-is-python3 \
            libssl-dev liblz4-tool rsync wget jq golang patch

      - name: 🛠️ Setup Git and Repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "PATH=$HOME/bin:$PATH" >> $GITHUB_ENV
          
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config --global color.ui false

      - name: 📥 Initialize AviumUI source
        run: |
          mkdir -p avium
          cd avium
          repo init -u https://github.com/AviumUI/android_manifests -b avium-16.2 --git-lfs --depth=1

      - name: 📝 Add LineageOS official manifests
        run: |
          cd avium
          mkdir -p .repo/local_manifests
          cat > .repo/local_manifests/kebab.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project name="LineageOS/android_device_oneplus_kebab" 
                     path="device/oneplus/kebab" 
                     remote="github" 
                     revision="lineage-23.2" />
            
            <project name="LineageOS/android_device_oneplus_sm8250-common" 
                     path="device/oneplus/sm8250-common" 
                     remote="github" 
                     revision="lineage-23.2" />
            
            <project name="LineageOS/android_kernel_oneplus_sm8250" 
                     path="kernel/oneplus/sm8250" 
                     remote="github" 
                     revision="lineage-23.2" />
          </manifest>
          EOF

      - name: 🔄 Sync sources
        run: |
          cd avium
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: 🧩 Integrate LATEST OFFICIAL KernelSU
        run: |
          cd avium/kernel/oneplus/sm8250
          
          # 克隆最新版官方KernelSU源码
          git clone https://github.com/tiann/KernelSU.git --depth=1
          
          # 手动应用官方内核补丁
          patch -p1 < KernelSU/kernel/patch/ksu.patch
          
          # 手动添加内核配置
          echo "CONFIG_KSU=y" >> arch/arm64/configs/lineageos_kebab_defconfig
          echo "CONFIG_KSU_DEBUG=n" >> arch/arm64/configs/lineageos_kebab_defconfig
          
          # 保存KSU版本号供后续使用
          echo "KSU_VERSION=$(grep "KSU_VERSION" KernelSU/kernel/version.h | awk '{print $3}')" >> $GITHUB_ENV
          
          # 验证集成
          if grep -q "CONFIG_KSU=y" arch/arm64/configs/lineageos_kebab_defconfig; then
            echo "✅ 官方最新版KernelSU集成成功"
            echo "✅ KSU版本: ${{ env.KSU_VERSION }}"
            echo "✅ 内核版本: $(make kernelversion)"
          else
            echo "❌ KernelSU集成失败"
            exit 1
          fi

      - name: 📥 Download ONLY vendor and odm from LineageOS official
        run: |
          cd avium
          # 自动获取最新LineageOS官方下载链接
          LATEST_URL=$(curl -s https://download.lineageos.org/api/v2/kebab/builds | jq -r '.response[0].url')
          echo "Latest LineageOS build: $LATEST_URL"
          
          # 只下载payload.bin前1MB（包含所有分区信息）
          curl -r 0-1048576 -o payload_header.bin "$LATEST_URL"
          
          # 安装payload解析工具
          pip install protobuf brotli
          git clone https://github.com/ssut/payload-dumper-go.git
          cd payload-dumper-go
          go build
          
          # 解析分区信息
          ./payload-dumper-go -list ../payload_header.bin > partitions.txt
          
          # 提取vendor和odm的偏移和大小
          VENDOR_OFFSET=$(grep -A2 "vendor" partitions.txt | grep offset | awk '{print $2}')
          VENDOR_SIZE=$(grep -A2 "vendor" partitions.txt | grep size | awk '{print $2}')
          ODM_OFFSET=$(grep -A2 "odm" partitions.txt | grep offset | awk '{print $2}')
          ODM_SIZE=$(grep -A2 "odm" partitions.txt | grep size | awk '{print $2}')
          
          echo "Vendor: offset=$VENDOR_OFFSET, size=$VENDOR_SIZE"
          echo "ODM: offset=$ODM_OFFSET, size=$ODM_SIZE"
          
          # 只下载这两个分区
          curl -r $VENDOR_OFFSET-$((VENDOR_OFFSET+VENDOR_SIZE-1)) -o vendor.img "$LATEST_URL"
          curl -r $ODM_OFFSET-$((ODM_OFFSET+ODM_SIZE-1)) -o odm.img "$LATEST_URL"
          
          # 清理临时文件
          cd ..
          rm -rf payload-dumper-go payload_header.bin partitions.txt

      - name: 📦 Extract vendor blobs
        run: |
          cd avium
          mkdir -p /mnt/vendor /mnt/odm
          sudo mount -o loop vendor.img /mnt/vendor
          sudo mount -o loop odm.img /mnt/odm
          
          cd device/oneplus/kebab
          ./extract-files.py /mnt
          
          sudo umount /mnt/vendor /mnt/odm
          rm -f ../../vendor.img ../../odm.img

      - name: ⚙️ Apply your custom AviumUI config
        run: |
          cd avium
          CONFIG_FILE="device/oneplus/kebab/lineage_kebab.mk"
          
          echo -e "\n# ======================================" >> $CONFIG_FILE
          echo -e "# AviumUI 16.2 Custom Configuration" >> $CONFIG_FILE
          echo -e "# ======================================" >> $CONFIG_FILE
          echo "AVIUM_MAINTAINER := \"bmbxwbh\"" >> $CONFIG_FILE
          echo "AVIUM_SETTINGS_SOC_MODEL_NAME := \"Snapdragon 865\"" >> $CONFIG_FILE
          echo "AVIUM_SETTINGS_DEVICE_CODENAME := \"kebab\"" >> $CONFIG_FILE
          echo "WITH_GMS := true" >> $CONFIG_FILE
          echo "TARGET_FORCE_ENABLE_BLUR := true" >> $CONFIG_FILE
          echo "AVIUM_FORCE_SET_FAKE_PROP := true" >> $CONFIG_FILE
          
          # 显示最终配置
          echo "✅ 已应用以下配置："
          tail -7 $CONFIG_FILE

      - name: 🏗️ Build ROM
        run: |
          cd avium
          source build/envsetup.sh
          lunch lineage_kebab-bp4a-userdebug
          m bacon -j$(nproc --all)
          
          # 保存ROM文件名供后续使用
          echo "ROM_FILE=$(ls out/target/product/kebab/AviumUI-*.zip)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: 🚀 Auto Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v16.2-${{ env.BUILD_DATE }}-${{ github.run_number }}
          name: AviumUI 16.2 for OnePlus 8T (${{ env.BUILD_DATE }})
          body: |
            # AviumUI 16.2 for OnePlus 8T (kebab)
            
            ## 基本信息
            - **设备**: OnePlus 8T (kebab)
            - **系统版本**: AviumUI 16.2 (Android 16)
            - **内核版本**: 4.19.311
            - **KernelSU版本**: ${{ env.KSU_VERSION }}
            - **构建时间**: ${{ env.BUILD_DATE }}
            - **维护者**: bmbxwbh
            
            ## 已启用功能
            - ✅ 内置Google服务(GMS)
            - ✅ 强制开启系统模糊效果
            - ✅ 隐藏Bootloader解锁状态
            - ✅ 内置最新版KernelSU
            
            ## 刷机说明
            1. 确保已刷入最新OxygenOS 14.1.0.602固件
            2. 使用TWRP 3.7.1_12-0版本刷入
            3. 首次刷机请进行完整数据格式化
          files: |
            avium/${{ env.ROM_FILE }}
            avium/out/target/product/kebab/boot.img
            avium/out/target/product/kebab/dtbo.img
            avium/out/target/product/kebab/vbmeta.img
          draft: false
          prerelease: false
