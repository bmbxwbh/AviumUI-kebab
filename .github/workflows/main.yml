name: 编译 AviumUI 16.2 适用于一加 8T (kebab)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    permissions:
      contents: write

    steps:
      - name: 清理磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/lib/android
          sudo rm -rf /usr/lib/jvm/* /opt/hostedtoolcache/* /var/lib/docker
          sudo apt clean
          sudo rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/*
          sudo swapoff -a
          df -h /

      - name: 安装依赖包
        run: |
          sudo apt update -y
          sudo apt install -y git gnupg flex bison build-essential zip curl \
            zlib1g-dev libc6-dev-i386 libncurses5-dev lib32ncurses-dev \
            x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev \
            libxml2-utils xsltproc unzip python3 python3-pip python-is-python3 \
            libssl-dev liblz4-tool rsync wget jq golang patch

      - name: 配置 repo 工具
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "PATH=$HOME/bin:$PATH" >> $GITHUB_ENV
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: 初始化 AviumUI 源码
        run: |
          mkdir avium
          cd avium
          repo init -u https://github.com/AviumUI/android_manifests -b avium-16.2 --git-lfs --depth=1

      - name: 添加本地配置清单
        run: |
          cd avium
          mkdir -p .repo/local_manifests
          echo '<?xml version="1.0" encoding="UTF-8"?>' > .repo/local_manifests/kebab.xml
          echo '<manifest>' >> .repo/local_manifests/kebab.xml
          echo '  <remove-project name="platform/prebuilts/clang/host/linux-x86" />' >> .repo/local_manifests/kebab.xml
          echo '  <remove-project name="platform/external/chromium-webview" />' >> .repo/local_manifests/kebab.xml
          echo '' >> .repo/local_manifests/kebab.xml
          echo '  <project name="LineageOS/android_device_oneplus_kebab" path="device/oneplus/kebab" remote="github" revision="lineage-23.2" />' >> .repo/local_manifests/kebab.xml
          echo '  <project name="LineageOS/android_device_oneplus_sm8250-common" path="device/oneplus/sm8250-common" remote="github" revision="lineage-23.2" />' >> .repo/local_manifests/kebab.xml
          echo '  <project name="LineageOS/android_kernel_oneplus_sm8250" path="kernel/oneplus/sm8250" remote="github" revision="lineage-23.2" />' >> .repo/local_manifests/kebab.xml
          echo '</manifest>' >> .repo/local_manifests/kebab.xml

      - name: 同步源码
        run: |
          cd avium
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: 下载官方 Clang 预编译包
        run: |
          cd avium
          mkdir -p prebuilts/clang/host/linux-x86
          curl -L https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-16.0.0_r10/clang-r536225.tar.gz | tar -xzf - -C prebuilts/clang/host/linux-x86

      - name: 集成 KernelSU
        run: |
          cd avium/kernel/oneplus/sm8250
          git clone https://github.com/tiann/KernelSU.git --depth=1
          patch -p1 < KernelSU/kernel/patch/ksu.patch
          echo "CONFIG_KSU=y" >> arch/arm64/configs/lineageos_kebab_defconfig
          echo "CONFIG_KSU_DEBUG=n" >> arch/arm64/configs/lineageos_kebab_defconfig
          KSUV=$(grep KSU_VERSION KernelSU/kernel/version.h | awk '{print $3}')
          echo "KSU_VERSION=$KSUV" >> $GITHUB_ENV

      - name: 从 LineageOS 提取厂商驱动
        run: |
          cd avium
          LATEST_URL=$(curl -s https://download.lineageos.org/api/v2/kebab/builds | jq -r '.response[0].url')
          git clone https://github.com/ssut/payload-dumper-go.git
          cd payload-dumper-go && go build
          curl -r 0-1048576 -o ../payload.bin "$LATEST_URL"
          ./payload-dumper-go -l ../payload.bin > parts.txt
          VO=$(awk '/vendor/{getline;print $2}' parts.txt)
          VS=$(awk '/vendor/{getline;getline;print $2}' parts.txt)
          OO=$(awk '/odm/{getline;print $2}' parts.txt)
          OS=$(awk '/odm/{getline;getline;print $2}' parts.txt)
          curl -r $VO-$((VO+VS-1)) -o ../vendor.img "$LATEST_URL"
          curl -r $OO-$((OO+OS-1)) -o ../odm.img "$LATEST_URL"
          mkdir -p /mnt/v /mnt/o
          sudo mount -o loop ../vendor.img /mnt/v
          sudo mount -o loop ../odm.img /mnt/o
          cd ../device/oneplus/kebab
          ./extract-files.py /mnt
          sudo umount /mnt/v /mnt/o
          cd ../../..
          rm -rf payload-dumper-go payload.bin vendor.img odm.img parts.txt

      - name: 应用自定义配置
        run: |
          cd avium
          echo 'AVIUM_MAINTAINER := "bmbxwbh"' >> device/oneplus/kebab/lineage_kebab.mk
          echo 'AVIUM_SETTINGS_SOC_MODEL_NAME := "Snapdragon 865"' >> device/oneplus/kebab/lineage_kebab.mk
          echo 'AVIUM_SETTINGS_DEVICE_CODENAME := "kebab"' >> device/oneplus/kebab/lineage_kebab.mk
          echo 'WITH_GMS := true' >> device/oneplus/kebab/lineage_kebab.mk
          echo 'TARGET_FORCE_ENABLE_BLUR := true' >> device/oneplus/kebab/lineage_kebab.mk
          echo 'AVIUM_FORCE_SET_FAKE_PROP := true' >> device/oneplus/kebab/lineage_kebab.mk
          echo 'TARGET_NO_DEBUG_SYMBOLS := true' >> device/oneplus/kebab/lineage_kebab.mk

      - name: 开始编译 ROM
        run: |
          cd avium
          source build/envsetup.sh
          lunch lineage_kebab-bp4a-userdebug
          make bacon -j$(nproc --all)
          BUILD_DATE=$(date +%Y%m%d)
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          ROM=$(ls out/target/product/kebab/AviumUI-*.zip)
          echo "ROM_PATH=$ROM" >> $GITHUB_ENV

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: avium-kebab-${{ env.BUILD_DATE }}-${{ github.run_number }}
          name: AviumUI 16.2 一加 8T ${{ env.BUILD_DATE }}
          body: |
            ✅ 设备：一加 8T (kebab)
            ✅ 版本：AviumUI 16.2
            ✅ 维护者：bmbxwbh
            ✅ 内置 GMS
            ✅ 开启模糊效果
            ✅ 隐藏 Bootloader
            ✅ KernelSU 版本：${{ env.KSU_VERSION }}
          files: |
            ${{ env.ROM_PATH }}
            $(dirname ${{ env.ROM_PATH }})/boot.img
            $(dirname ${{ env.ROM_PATH }})/dtbo.img
            $(dirname ${{ env.ROM_PATH }})/vbmeta.img
