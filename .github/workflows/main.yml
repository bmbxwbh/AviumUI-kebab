name: Build AviumUI 16.2 for OnePlus 8T (kebab)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 420
    permissions:
      contents: write

    steps:
      - name: 🧹 ULTRA AGGRESSIVE Disk Cleanup (28GB+ free)
        run: |
          # 1. 删除所有预装软件和工具
          sudo apt-get purge -y --auto-remove \
            azure-cli google-chrome-stable firefox \
            microsoft-edge-stable powershell dotnet* \
            php* mysql* postgresql* mongodb* redis* \
            openjdk-* temurin-* adoptopenjdk-* \
            nodejs npm yarn golang-go rustc cargo \
            docker-ce docker-ce-cli containerd.io \
            kubectl helm terraform ansible

          # 2. 删除所有Docker镜像和容器
          docker system prune -a -f --volumes

          # 3. 删除所有APT缓存和临时文件
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /tmp/* /var/tmp/*

          # 4. 删除GitHub工具缓存
          sudo rm -rf /opt/hostedtoolcache/*

          # 5. 删除Swap文件（释放8GB）
          sudo swapoff -a
          sudo rm -f /swapfile

          # 6. 显示最终可用空间
          echo "✅ 清理完成，当前可用空间："
          df -h /

      - name: 📦 Install dependencies (fixed for Ubuntu 24.04)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git-core gnupg flex bison build-essential zip curl zlib1g-dev \
            libc6-dev-i386 libncurses5-dev lib32ncurses-dev x11proto-core-dev \
            libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc \
            unzip fontconfig python3 python3-pip python-is-python3 \
            libssl-dev liblz4-tool rsync wget jq golang patch

      - name: 🛠️ Setup repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "PATH=$HOME/bin:$PATH" >> $GITHUB_ENV
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config --global core.compression 9
          git config --global http.postBuffer 524288000

      - name: 📥 Init AviumUI
        run: |
          mkdir avium
          cd avium
          repo init -u https://github.com/AviumUI/android_manifests -b avium-16.2 --git-lfs --depth=1

      - name: 📝 Add local manifests
        run: |
          cd avium
          mkdir -p .repo/local_manifests
          cat > .repo/local_manifests/kebab.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project name="LineageOS/android_device_oneplus_kebab" path="device/oneplus/kebab" remote="github" revision="lineage-23.2" />
            <project name="LineageOS/android_device_oneplus_sm8250-common" path="device/oneplus/sm8250-common" remote="github" revision="lineage-23.2" />
            <project name="LineageOS/android_kernel_oneplus_sm8250" path="kernel/oneplus/sm8250" remote="github" revision="lineage-23.2" />
          </manifest>
          EOF

      - name: 🔄 Optimized repo sync (minimal download)
        run: |
          cd avium
          # 只同步必要的代码，跳过所有无用的预编译文件和文档
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --depth=1 \
            --exclude=platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
            --exclude=platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 \
            --exclude=platform/prebuilts/gcc/linux-x86/x86/x86_64-linux-android-4.9 \
            --exclude=platform/prebuilts/gdb \
            --exclude=platform/prebuilts/perfetto \
            --exclude=platform/external/chromium-webview \
            --exclude=platform/external/google-fonts \
            --exclude=platform/external/noto-fonts \
            --exclude=platform/docs \
            --exclude=platform/art/test \
            --exclude=platform/frameworks/base/tests

      - name: 🧩 Integrate latest official KernelSU
        run: |
          cd avium/kernel/oneplus/sm8250
          git clone https://github.com/tiann/KernelSU.git --depth=1
          patch -p1 < KernelSU/kernel/patch/ksu.patch
          echo "CONFIG_KSU=y" >> arch/arm64/configs/lineageos_kebab_defconfig
          echo "CONFIG_KSU_DEBUG=n" >> arch/arm64/configs/lineageos_kebab_defconfig
          KSUV=$(grep KSU_VERSION KernelSU/kernel/version.h | awk '{print $3}')
          echo "KSU_VERSION=$KSUV" >> $GITHUB_ENV

      - name: 📥 Get vendor & odm from LineageOS official
        run: |
          cd avium
          LATEST_URL=$(curl -s https://download.lineageos.org/api/v2/kebab/builds | jq -r '.response[0].url')
          curl -r 0-1048576 -o payload.bin "$LATEST_URL"
          git clone https://github.com/ssut/payload-dumper-go.git
          cd payload-dumper-go && go build
          ./payload-dumper-go -l ../payload.bin > parts.txt
          VO=$(awk '/vendor/{getline;print $2}' parts.txt)
          VS=$(awk '/vendor/{getline;getline;print $2}' parts.txt)
          OO=$(awk '/odm/{getline;print $2}' parts.txt)
          OS=$(awk '/odm/{getline;getline;print $2}' parts.txt)
          curl -r $VO-$((VO+VS-1)) -o vendor.img "$LATEST_URL"
          curl -r $OO-$((OO+OS-1)) -o odm.img "$LATEST_URL"
          mkdir -p /mnt/v /mnt/o
          sudo mount -o loop vendor.img /mnt/v
          sudo mount -o loop odm.img /mnt/o
          cd ../device/oneplus/kebab
          ./extract-files.py /mnt
          sudo umount /mnt/v /mnt/o
          cd ../../..
          rm -rf payload-dumper-go payload.bin vendor.img odm.img parts.txt

      - name: ⚙️ Apply your config
        run: |
          cd avium
          cat >> device/oneplus/kebab/lineage_kebab.mk << 'EOF'
          AVIUM_MAINTAINER := "bmbxwbh"
          AVIUM_SETTINGS_SOC_MODEL_NAME := "Snapdragon 865"
          AVIUM_SETTINGS_DEVICE_CODENAME := "kebab"
          WITH_GMS := true
          TARGET_FORCE_ENABLE_BLUR := true
          AVIUM_FORCE_SET_FAKE_PROP := true
          EOF

      - name: 🏗️ Build
        run: |
          cd avium
          source build/envsetup.sh
          lunch lineage_kebab-bp4a-userdebug
          m bacon -j$(nproc --all)
          DATE=$(date +%Y%m%d)
          echo "BUILD_DATE=$DATE" >> $GITHUB_ENV
          ROM=$(ls out/target/product/kebab/AviumUI-*.zip)
          echo "ROM_PATH=$ROM" >> $GITHUB_ENV

      - name: 🚀 Auto release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: avium-kebab-${{ env.BUILD_DATE }}-${{ github.run_number }}
          name: AviumUI 16.2 kebab ${{ env.BUILD_DATE }}
          body: |
            ✅ 设备：OnePlus 8T (kebab)
            ✅ 版本：AviumUI 16.2 (Android 16)
            ✅ 维护者：bmbxwbh
            ✅ 内置 GMS
            ✅ 隐藏 Bootloader
            ✅ 强制模糊
            ✅ KernelSU: ${{ env.KSU_VERSION }}
          files: |
            ${{ env.ROM_PATH }}
            $(dirname ${{ env.ROM_PATH }})/boot.img
            $(dirname ${{ env.ROM_PATH }})/dtbo.img
            $(dirname ${{ env.ROM_PATH }})/vbmeta.img

